services:
  # ── PostgreSQL ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce3d_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce3d
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── pgAdmin (UI web para o banco) ─────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ecommerce3d_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ecommerce3d.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres
    profiles:
      - debug

volumes:
  postgres_data:
